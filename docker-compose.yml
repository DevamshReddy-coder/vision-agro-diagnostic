version: '3.8'

services:
  # Infrastructure: Cache & Real-time Queue
  redis:
    image: redis:7-alpine
    container_name: agro_cache
    ports:
      - "6379:6379"

  # Infrastructure: Persistence (PostgreSQL for v4.0 Engine)
  postgres:
    image: postgres:15-alpine
    container_name: agro_db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: agro_user
      POSTGRES_PASSWORD: secure_pwd
      POSTGRES_DB: agrovision_core
    volumes:
      - pg_data:/var/lib/postgresql/data

  # Core API: NestJS v4.0 Engine (Modern Backend)
  backend:
    build: ./agrovision-backend
    container_name: agro_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./agrovision-backend/.env
    environment:
      - DATABASE_URL=postgresql://agro_user:secure_pwd@postgres:5432/agrovision_core
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis

  # ML Service: Python FastAPI Computer Vision
  ml-service:
    build: ./ml-service
    container_name: agro_ml
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/resnet50_v2.pth
      - XAI_MODE=enabled

  # Frontend: Next.js 15 PWA
  frontend:
    build: ./client
    container_name: agro_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend

volumes:
  pg_data:
