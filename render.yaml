services:
  # Core API: NestJS v4.0 Engine
  - type: web
    name: agrovision-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    rootDir: agrovision-backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agrovision-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: agrovision-cache
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: GEMINI_API_KEY
        sync: false # Must be set in Render Dashboard
      - key: CORS_ORIGIN
        value: "*" # Safe for initial global deployment

  # ML Service: Python FastAPI Computer Vision
  - type: web
    name: agrovision-ml
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 8000
    rootDir: ml-service

  # Frontend: Next.js Platform
  - type: web
    name: agrovision-frontend
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm run start
    rootDir: client
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: agrovision-api
          property: url
          suffix: /api/v1

databases:
  - name: agrovision-db
    databaseName: agrovision_core
    plan: free
    region: oregon

redis:
  - name: agrovision-cache
    plan: free
    region: oregon
